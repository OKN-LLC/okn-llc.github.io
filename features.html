<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>強み | OKN合同会社</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<main class="mx-auto max-w-7xl px-4 py-20">

<h1 class="text-5xl font-bold">OKN合同会社の強み</h1>

<div class="mt-16 grid gap-8 md:grid-cols-2">

<div class="rounded-3xl bg-white/5 p-8 border border-white/10">
<h2 class="text-2xl font-semibold">現場実務を理解</h2>
<p class="mt-4 leading-8 text-slate-300">
現場目線で必要とされる品質・納期・対応力を重視しています。
</p>
</div>

<div class="rounded-3xl bg-white/5 p-8 border border-white/10">
<h2 class="text-2xl font-semibold">海外対応力</h2>
<p class="mt-4 leading-8 text-slate-300">
海外工場との交渉、輸入、物流、仕入調整に対応します。
</p>
</div>

<div class="rounded-3xl bg-white/5 p-8 border border-white/10">
<h2 class="text-2xl font-semibold">柔軟な提案</h2>
<p class="mt-4 leading-8 text-slate-300">
案件規模や用途に応じて柔軟にご提案します。
</p>
</div>

<div class="rounded-3xl bg-white/5 p-8 border border-white/10">
<h2 class="text-2xl font-semibold">法人取引対応</h2>
<p class="mt-4 leading-8 text-slate-300">
継続取引・法人対応を前提としたサポートを行います。
</p>
</div>

</div>

</main>

</body>
</html>
